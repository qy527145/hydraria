<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hydraria — Multi-thread Stream Proxy</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --panel-2: #1b202c;
    --border: #262c3a;
    --text: #e5e9f0;
    --muted: #8892a6;
    --accent: #6ea8ff;
    --accent-2: #9b7bff;
    --good: #4ade80;
    --bad: #f87171;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #11141c, #0b0d12);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header .tagline { color: var(--muted); font-size: 12px; }
  main {
    padding: 24px 32px;
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    gap: 24px;
    grid-template-columns: 1fr 1fr;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h2 {
    margin: 0 0 16px;
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 12px 0 6px;
  }
  input, textarea, select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b0d12;
    border: 0;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    font-size: 13px;
  }
  button.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 0;
  }
  button.danger {
    background: transparent;
    color: var(--bad);
    border: 1px solid var(--bad);
    margin: 0;
    padding: 6px 10px;
    font-size: 12px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th { color: var(--muted); font-weight: 500; font-size: 12px; }
  td.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  td .url {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-2);
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transform: translateY(20px);
    opacity: 0;
    transition: all .25s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--bad); color: var(--bad); }
  .toast.ok { border-color: var(--good); color: var(--good); }
  .empty {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <header>
    <div>
      <h1>HYDRARIA</h1>
      <div class="tagline">multi-thread HTTP stream proxy · local dashboard</div>
    </div>
    <div>
      <span class="pill" id="task-count">0 tasks</span>
    </div>
  </header>
  <main>
    <section class="card">
      <h2>New Proxy Task</h2>
      <label>Source URLs (one per line — multiple = multi-source pull)</label>
      <textarea id="f-urls" placeholder="https://server1.com/file.mp4&#10;https://server2.com/file.mp4"></textarea>
      <div class="row">
        <div>
          <label>Max Threads</label>
          <input id="f-threads" type="number" value="16" min="1" max="128" />
        </div>
        <div>
          <label>Split Size (e.g. 5M, 1M, 512K)</label>
          <input id="f-split" type="text" value="5M" />
        </div>
      </div>
      <label>Custom Headers (JSON, optional)</label>
      <textarea id="f-headers" placeholder='{"User-Agent": "Mozilla/5.0", "Cookie": "session=xxxx"}'></textarea>
      <div class="row">
        <div>
          <label>Name (optional)</label>
          <input id="f-name" type="text" placeholder="my-movie" />
        </div>
        <div>
          <label>Cache</label>
          <select id="f-cache">
            <option value="false">disabled</option>
            <option value="true">enabled</option>
          </select>
        </div>
      </div>
      <button id="btn-create">Create Task &amp; Generate Short Link</button>
    </section>

    <section class="card">
      <h2>Active Tasks</h2>
      <div id="task-list"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);

function toast(msg, kind = "") {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show " + kind;
  clearTimeout(t._h);
  t._h = setTimeout(() => { t.className = "toast " + kind; }, 2400);
}

function fmtBytes(n) {
  if (!n && n !== 0) return "-";
  const units = ["B","K","M","G","T"];
  let i = 0; let v = n;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(v >= 100 || i === 0 ? 0 : 1) + units[i];
}

function fmtTime(unix) {
  if (!unix) return "-";
  const d = new Date(unix * 1000);
  return d.toLocaleString();
}

async function api(path, options = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = j.error || msg; } catch {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function refresh() {
  try {
    const tasks = await api("/api/tasks");
    render(tasks);
  } catch (e) {
    console.warn("refresh failed", e);
  }
}

function render(tasks) {
  $("#task-count").textContent = tasks.length + (tasks.length === 1 ? " task" : " tasks");
  const root = $("#task-list");
  if (!tasks.length) {
    root.innerHTML = '<div class="empty">No active tasks yet. Create one to get a short link.</div>';
    return;
  }
  const rows = tasks.map(t => `
    <tr>
      <td class="mono">${t.task_id}</td>
      <td>
        <div class="url"><span class="mono" id="u-${t.task_id}">${t.proxy_url}</span></div>
        <div style="margin-top: 6px; display: flex; gap: 6px;">
          <button class="ghost" data-copy="${t.task_id}">Copy</button>
          <button class="danger" data-del="${t.task_id}">Delete</button>
        </div>
      </td>
      <td>
        <div>${t.config.urls.length} source(s)</div>
        <div class="pill" title="threads">${t.config.max_threads} thr</div>
        <div class="pill" title="split">${fmtBytes(t.config.max_split)}</div>
      </td>
      <td>${fmtBytes(t.bytes_served)}</td>
      <td>${t.active_connections}</td>
      <td>${fmtTime(t.created_at)}</td>
    </tr>
  `).join("");
  root.innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>Short Link</th><th>Config</th><th>Served</th><th>Conns</th><th>Created</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  root.querySelectorAll("[data-copy]").forEach(b => b.onclick = () => {
    const id = b.dataset.copy;
    const url = document.getElementById("u-" + id).textContent;
    navigator.clipboard.writeText(url).then(
      () => toast("Copied: " + url, "ok"),
      () => toast("Copy failed", "error"),
    );
  });
  root.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if (!confirm("Delete task " + b.dataset.del + "?")) return;
    try {
      await api("/api/tasks/" + b.dataset.del, { method: "DELETE" });
      toast("Task deleted", "ok");
      refresh();
    } catch (e) {
      toast("Delete failed: " + e.message, "error");
    }
  });
}

$("#btn-create").onclick = async () => {
  const urlsRaw = $("#f-urls").value.trim();
  const urls = urlsRaw.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!urls.length) return toast("At least one URL is required", "error");

  let headers = {};
  const hRaw = $("#f-headers").value.trim();
  if (hRaw) {
    try { headers = JSON.parse(hRaw); }
    catch (e) { return toast("Headers must be valid JSON", "error"); }
  }

  const payload = {
    urls,
    max_threads: parseInt($("#f-threads").value, 10) || 8,
    max_split: $("#f-split").value.trim() || "5M",
    cache: $("#f-cache").value === "true",
    headers,
    name: $("#f-name").value.trim() || null,
  };

  try {
    const res = await api("/api/tasks", { method: "POST", body: JSON.stringify(payload) });
    toast("Created: " + res.proxy_url, "ok");
    refresh();
  } catch (e) {
    toast("Create failed: " + e.message, "error");
  }
};

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
